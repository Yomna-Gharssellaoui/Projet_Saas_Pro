version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: saas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 9512
      POSTGRES_DB: saas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Back-End
      dockerfile: Dockerfile
    container_name: saas_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: 9512
      DB_NAME: saas_db
      JWT_SECRET: supersecret123
      JWT_EXPIRES_IN: 1d
      CORS_ORIGINS: http://localhost,http://localhost:80
      FRONTEND_URL: http://localhost
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USER: rahouejaziz3@gmail.com
      MAIL_PASS: yadlmqaplhdtyqek
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: http://localhost:3001/api/auth/google/callback
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_CALLBACK_URL: http://localhost:3001/api/auth/github/callback
      INVOICE_CHATBOT_URL: http://ai-service:8011
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET:-}
      PAYPAL_MODE: sandbox
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./Front-End
      dockerfile: Dockerfile
    container_name: saas_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
