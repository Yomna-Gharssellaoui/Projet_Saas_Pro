apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: rahouej/erp-backend:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "postgres"
            - name: DB_NAME
              value: "saas_db"
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt-secret
            - name: JWT_EXPIRES_IN
              value: "1d"
            - name: CORS_ORIGINS
              value: "http://erp.local,https://your-app.vercel.app"
            - name: FRONTEND_URL
              value: "http://erp.local"
            - name: MAIL_HOST
              value: "smtp.gmail.com"
            - name: MAIL_PORT
              value: "587"
            - name: MAIL_USER
              value: "rahouejaziz3@gmail.com"
            - name: MAIL_PASS
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: mail-pass
            - name: GOOGLE_CLIENT_ID
              value: "139367425386-adode57vimn2u5t7d7c3pvm1nkpbjtce.apps.googleusercontent.com"
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: google-client-secret
            - name: GOOGLE_CALLBACK_URL
              value: "http://erp.local/api/auth/google/callback"
            - name: GITHUB_CLIENT_ID
              value: "Ov23liNcYt110QwMbEfh"
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: github-client-secret
            - name: GITHUB_CALLBACK_URL
              value: "http://erp.local/api/auth/github/callback"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: gemini-api-key
            - name: INVOICE_CHATBOT_URL
              value: "http://ai-service:8011"
            - name: PAYPAL_MODE
              value: "sandbox"
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 20
