# ─────────────────────────────────────────────────────────────────────────────
# BEFORE APPLYING: fill in every <PLACEHOLDER> below, then run:
#   kubectl apply -f 02-alertmanager-config-secret.yaml
#
# Placeholders:
#   <SLACK_WEBHOOK_URL>   – incoming-webhook URL from your Slack app
#   <SMTP_HOST>           – e.g. smtp.gmail.com:587
#   <SMTP_FROM>           – alerts@yourdomain.com
#   <SMTP_USER>           – same as FROM, or your SMTP login
#   <SMTP_PASSWORD>       – app password / SMTP secret
#   <ALERT_EMAIL_TO>      – team inbox, e.g. devops@yourdomain.com
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config
  namespace: monitoring
type: Opaque
stringData:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      smtp_smarthost: '<SMTP_HOST>'
      smtp_from: '<SMTP_FROM>'
      smtp_auth_username: '<SMTP_USER>'
      smtp_auth_password: '<SMTP_PASSWORD>'
      smtp_require_tls: true

    templates:
      - '/etc/alertmanager/templates/*.tmpl'

    route:
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'slack-critical'
      routes:
        - match:
            severity: critical
          receiver: 'slack-critical'
          continue: true
        - match:
            severity: critical
          receiver: 'email-critical'
        - match:
            severity: warning
          receiver: 'slack-warning'

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'namespace']

    receivers:
      - name: 'slack-critical'
        slack_configs:
          - api_url: '<SLACK_WEBHOOK_URL>'
            channel: '#alerts-critical'
            send_resolved: true
            title: '{{ template "slack.title" . }}'
            text: '{{ template "slack.text" . }}'
            color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'

      - name: 'slack-warning'
        slack_configs:
          - api_url: '<SLACK_WEBHOOK_URL>'
            channel: '#alerts-warning'
            send_resolved: true
            title: '{{ template "slack.title" . }}'
            text: '{{ template "slack.text" . }}'
            color: 'warning'

      - name: 'email-critical'
        email_configs:
          - to: '<ALERT_EMAIL_TO>'
            send_resolved: true
            headers:
              subject: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
